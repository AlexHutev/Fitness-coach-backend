services:
  db:
    image: postgres:16-alpine
    container_name: fitness_coach_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitness_coach
      POSTGRES_PASSWORD: fitness_coach
      POSTGRES_DB: fitness_coach
    ports:
      # Host 5433 → container 5432. Avoids collision with native Postgres on host's 5432.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness_coach -d fitness_coach"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
